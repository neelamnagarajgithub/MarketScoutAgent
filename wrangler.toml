name = "market-scout-api-gateway"
main = "src/index.ts"
compatibility_date = "2024-04-08"
type = "service"

[env.production]
name = "market-scout-api-prod"
route = "api.marketscout.io/*"
zone_id = "your-zone-id"

[env.staging]  
name = "market-scout-api-staging"
route = "staging-api.marketscout.io/*"
zone_id = "your-staging-zone-id"

[[kv_namespaces]]
binding = "CACHE"
id = "your-kv-namespace-id"
preview_id = "your-kv-preview-id"

[env.production.kv_namespaces]
binding = "CACHE"
id = "prod-kv-id"

[triggers]
crons = ["0 */6 * * *"]

limits = { cpu_sec = 30 }

[observability]
enabled = true
