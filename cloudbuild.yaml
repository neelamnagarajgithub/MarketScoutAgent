steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/market-scout-api:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/market-scout-api:latest'
      - '-f'
      - 'Dockerfile'
      - '.'

  # Push to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/market-scout-api:$SHORT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - run
      - --filename=k8s/
      - --location=us-central1
      - --cluster=market-scout-cluster

  # Deploy to Cloud Run (alternative simpler approach)
  - name: 'gcr.io/cloud-builders/run'
    args:
      - deploy
      - market-scout-api
      - --image
      - 'gcr.io/$PROJECT_ID/market-scout-api:$SHORT_SHA'
      - --region
      - us-central1
      - --platform
      - managed
      - --allow-unauthenticated
      - --memory
      - 2Gi
      - --timeout
      - 3600
      - --set-env-vars
      - 'ENVIRONMENT=production'

images:
  - 'gcr.io/$PROJECT_ID/market-scout-api:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/market-scout-api:latest'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: 3600s
