# Render.com configuration for FastAPI Backend
services:
  - type: web
    name: market-scout-api
    runtime: python
    pythonVersion: 3.11
    plan: starter  # ⚠️ UPGRADE FROM FREE (512MB) to STARTER (1GB) minimum
    autoScaleFactor: 0.5
    # Use optimized requirements to reduce memory footprint
    buildCommand: "pip install --upgrade pip && pip install -r requirements-prod.txt"
    startCommand: "gunicorn --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8080 app.main:app"
    healthCheckPath: /health
    healthCheckInterval: 30
    healthCheckTimeout: 10
    startupTimeout: 600
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: PORT
        value: "8080"
      - key: WEB_CONCURRENCY
        value: "2"
    # Add these in Render dashboard Settings → Environment:
    # - DATABASE_URL (from Supabase)
    # - GOOGLE_API_KEY  
    # - SUPABASE_URL
    # - SUPABASE_KEY
    # - SERPAPI_API_KEY
    # - NEWSAPI_KEY
    # - GITHUB_TOKEN
    # ... and other API keys from config.yaml
    autoDeploy: true
