# Render.com configuration for FastAPI Backend
services:
  - type: web
    name: market-scout-api
    runtime: python
    pythonVersion: 3.11
    plan: starter
    autoScaleFactor: 0.5
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port 8080"
    healthCheckPath: /health
    healthCheckInterval: 30
    healthCheckTimeout: 10
    startupTimeout: 600
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: PORT
        value: "8080"
    # Add these in Render dashboard Settings → Environment:
    # - DATABASE_URL (from Supabase)
    # - GOOGLE_API_KEY  
    # - SUPABASE_URL
    # - SUPABASE_KEY
    # - SERPAPI_API_KEY
    # - NEWSAPI_KEY
    # - GITHUB_TOKEN
    # ... and other API keys from config.yaml
    autoDeploy: true
