apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-scout-api
  labels:
    app: market-scout-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: market-scout-api
  template:
    metadata:
      labels:
        app: market-scout-api
    spec:
      containers:
      - name: market-scout-api
        image: gcr.io/PROJECT_ID/market-scout-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: ENVIRONMENT
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: market-scout-secrets
              key: database-url
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: market-scout-secrets
              key: google-api-key
        - name: SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: market-scout-secrets
              key: supabase-url
        - name: SUPABASE_KEY
          valueFrom:
            secretKeyRef:
              name: market-scout-secrets
              key: supabase-key
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: market-scout-api-service
spec:
  type: LoadBalancer
  selector:
    app: market-scout-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: market-scout-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: market-scout-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
